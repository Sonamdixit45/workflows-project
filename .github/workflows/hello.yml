name: Hello CI

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Lint Check
        run: npm run lint

      - name: Build Check
        run: npm run build

      - name: Run Tests
        run: npm test

      - name: Run Server Test
        run: |
          node server.js &
          sleep 5
          curl http://localhost:3000
