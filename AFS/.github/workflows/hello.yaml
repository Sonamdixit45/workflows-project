name: Hello CI

on:
  push:
    branches: [main]

jobs:
  check-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Test
        run: npm test

      - name: Start Server and Test API
        run: |
          node server.js &
          sleep 5
          curl http://localhost:3000